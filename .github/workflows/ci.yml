name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a new push to a PR voids the old run).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path filter: decide which package suites a change actually affects, so the
  # stable `dtfit` package is gated independently of the heavier research
  # packages (dtfit-experimental / dtfit-hardware). A change under
  # packages/dtfit/** runs the dtfit job; a research-only change does not drag
  # the whole dtfit matrix along, and vice versa. The workflow file itself is in
  # both filters so a CI change re-runs everything.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      dtfit: ${{ steps.filter.outputs.dtfit }}
      research: ${{ steps.filter.outputs.research }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dtfit:
              - 'packages/dtfit/**'
              - '.github/workflows/ci.yml'
            research:
              # The research packages install dtfit as a dependency, so a dtfit
              # change must re-test them too.
              - 'packages/dtfit/**'
              - 'packages/dtfit-experimental/**'
              - 'packages/dtfit-hardware/**'
              - '.github/workflows/ci.yml'

  # The stable, published package -- gated on its own: ruff, the accuracy gate,
  # mypy and the pytest coverage floor, across the full OS/Python matrix, with
  # the optional native kernels built on Linux.
  dtfit:
    needs: changes
    if: ${{ needs.changes.outputs.dtfit == 'true' }}
    runs-on: ${{ matrix.os }}
    # Enforce the optional native build only where CI actually builds it (Linux);
    # Windows/macOS run the pure-Python fallback, so native-required tests skip.
    env:
      DTFIT_REQUIRE_NATIVE: ${{ startsWith(matrix.os, 'ubuntu') && '1' || '' }}
    strategy:
      fail-fast: false
      matrix:
        # The package claims Windows/Linux/macOS parity (see the README's MKL
        # note) and the native kernels have a pure-Python fallback -- exercise
        # all three OSes so that parity is actually tested, not just asserted.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dtfit (with viz + dev extras)
        run: pip install -e "packages/dtfit[viz,dev]"

      # The optional C kernels need clang; only the Linux runner builds them.
      # Windows/macOS deliberately run on the NumPy/SciPy fallback, so CI also
      # covers the no-native code path.
      - name: Build native extension (dtfit)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang
          python build_native.py
        working-directory: packages/dtfit

      - name: Lint (ruff)
        run: ruff check packages/dtfit

      # Explicit, fast-failing accuracy gate over the whole model catalogue:
      # recovery matrix + every-method-runs guard (Phase 1), default-config
      # robustness (Phase 2), seed/noise stability (Phase 3) and the golden
      # regression snapshot (Phase 4). Surfaces a method-quality regression with
      # a legible step name before the full suite runs. See tests/accuracy/.
      - name: Accuracy gate — dtfit (full model catalogue)
        run: pytest -q tests/validation
        working-directory: packages/dtfit

      # ``--python-version`` is passed explicitly so mypy targets the matrix
      # interpreter: without it mypy resolves a lower target and rejects the
      # PEP 695 ``type`` statements in the numpy stubs that ship for Python
      # 3.12+ (``numpy/__init__.pyi: Type statement is only supported in 3.12+``).
      - name: Type check + test — dtfit
        run: |
          mypy --python-version ${{ matrix.python-version }}
          pytest --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=70
        working-directory: packages/dtfit

      # pandas is an OPTIONAL dependency: the run above installs dtfit WITHOUT it,
      # so it proves the library imports and every ndarray path works pandas-free
      # (the ~20 pandas-gated tests skip). This step then installs pandas and
      # re-runs the pandas-bearing modules so the "pandas in -> pandas out"
      # feature (Series/DataFrame inputs, index-aligned predict, date-indexed
      # forecasts) is actually exercised in CI rather than silently skipped.
      - name: Test with pandas (optional interop)
        run: |
          pip install "pandas>=2.0"
          pytest -q tests/test_pandas_io.py tests/methods/test_auto.py \
            tests/test_stochastic.py tests/estimators/test_regressor.py \
            tests/test_result.py
        working-directory: packages/dtfit

      # Publish the coverage report once (one OS/interpreter) as a build
      # artifact, so the number is visible/trendable without an external service.
      - name: Upload coverage report
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: packages/dtfit/coverage.xml
          if-no-files-found: error

  # The research packages (adaptations + hardware host-glue). They depend on
  # dtfit but are gated separately so their heavier deps / looser gates never
  # block the stable dtfit package.
  research:
    needs: changes
    if: ${{ needs.changes.outputs.research == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # dtfit is a runtime dependency of both research packages; install it
      # (with the dev tools: ruff/mypy/pytest) first, then the two packages.
      # ``viz`` pulls matplotlib, which the dtfit-experimental experiment modules
      # import at load time (their test suite imports those modules); it lives in
      # dtfit's viz extra, so the research job needs it just as the pre-split CI
      # did. (statsmodels/torch stay in experimental's heavier ``bench`` extra
      # and are importorskip-guarded in the tests, so they are not needed here.)
      - name: Install dtfit + research packages (with dev extras)
        run: |
          pip install -e "packages/dtfit[viz,dev]"
          pip install -e "packages/dtfit-experimental[dev]"
          pip install -e "packages/dtfit-hardware[dev]"

      - name: Lint (ruff)
        run: ruff check packages/dtfit-experimental packages/dtfit-hardware

      - name: Type check + test — dtfit-experimental
        run: |
          mypy --python-version ${{ matrix.python-version }}
          pytest
        working-directory: packages/dtfit-experimental

      # Host-glue driving real silicon: no board in CI, so this only checks the
      # package imports, ships its firmware, and the shell type-checks (mypy is
      # scoped to __init__.py -- the serial/BLE modules are not type-gated).
      - name: Type check + test — dtfit-hardware
        run: |
          mypy --python-version ${{ matrix.python-version }}
          pytest
        working-directory: packages/dtfit-hardware

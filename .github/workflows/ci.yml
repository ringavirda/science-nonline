name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install both packages (with viz + dev extras)
        run: |
          pip install -e "packages/dtfit[viz,dev]"
          pip install -e "packages/dtfit-experimental[dev]"

      - name: Lint (ruff)
        run: ruff check packages

      - name: Type check + test — dtfit
        run: |
          mypy
          pytest --cov --cov-report=term-missing
        working-directory: packages/dtfit

      - name: Type check + test — dtfit-experimental
        run: |
          mypy
          pytest
        working-directory: packages/dtfit-experimental

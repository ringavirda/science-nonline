name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install both packages (with viz + dev extras)
        run: |
          pip install -e "packages/dtfit[viz,dev]"
          pip install -e "packages/dtfit-experimental[dev]"

      - name: Build native extension (dtfit)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang
          python build_native.py
        working-directory: packages/dtfit

      - name: Lint (ruff)
        run: ruff check packages

      # Explicit, fast-failing accuracy gate over the whole model catalogue:
      # recovery matrix + every-method-runs guard (Phase 1), default-config
      # robustness (Phase 2), seed/noise stability (Phase 3) and the golden
      # regression snapshot (Phase 4). Surfaces a method-quality regression with
      # a legible step name before the full suite runs. See tests/accuracy/.
      - name: Accuracy gate — dtfit (full model catalogue)
        run: pytest -q tests/validation
        working-directory: packages/dtfit

      - name: Type check + test — dtfit
        run: |
          mypy
          pytest --cov --cov-report=term-missing
        working-directory: packages/dtfit

      - name: Type check + test — dtfit-experimental
        run: |
          mypy
          pytest
        working-directory: packages/dtfit-experimental

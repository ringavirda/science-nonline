[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "dtfit"
dynamic = ["version"]
description = "Differential-transformation fitting: nonlinear smoothing and forecasting via differential / non-Taylor transformations"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Oleksandr Tuhanskykh", email = "ringanaro@gmail.com" }]
keywords = ["regression", "nonlinear", "time-series", "differential-transformations", "statistical-learning"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Typing :: Typed",
]
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "sympy>=1.12",
    "scikit-learn>=1.6",  # validate_data / __sklearn_tags__ (estimator API)
]

[project.optional-dependencies]
viz = ["matplotlib>=3.7"]
dev = ["pytest>=7", "pytest-cov>=4", "ruff>=0.4", "mypy>=1.8"]
# The experiment / benchmark suite and the experimental adaptations (with their
# heavier deps: matplotlib/torch/statsmodels/pandas, and the optional cupy GPU
# backend) live in the separate `dtfit-experimental` distribution -- see
# `experimental/pyproject.toml` and its `bench` / `gpu` extras.

[project.urls]
Homepage = "https://github.com/ringavirda/science-pylab"
Repository = "https://github.com/ringavirda/science-pylab"
Issues = "https://github.com/ringavirda/science-pylab/issues"

[tool.setuptools.dynamic]
version = { attr = "dtfit.__about__.__version__" }

[tool.setuptools]
license-files = ["LICENSE"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dtfit = [
    "py.typed",          # ship inline type information (PEP 561)
]
# The optional compiled kernels live in the private numeric core
# (dtfit._core._native); ship their source, type stub and built artifacts.
"dtfit._core" = [
    "_native.c",         # source of the optional compiled kernels
    "_native.pyi",       # type stub for the compiled extension
    "*.pyd",             # compiled kernels (Windows), if built
    "*.so",              # compiled kernels (Linux/macOS), if built
]

[tool.ruff]
line-length = 79
target-version = "py310"

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]  # star re-exports are intentional

[tool.pytest.ini_options]
testpaths = ["tests"]
# Put tests/ on sys.path so the shared accuracy corpus (tests/accuracy/) is
# importable as `accuracy.*` from the grouped test subdirectories.
pythonpath = ["tests"]

[tool.mypy]
# No `python_version` pin here on purpose. mypy's default target does NOT track
# the running interpreter, so pinning a single version (e.g. 3.10) makes it
# reject the PEP 695 `type` statements in the numpy stubs shipped for 3.12+.
# Instead CI passes `--python-version ${{ matrix.python-version }}` so each job
# type-checks against its own interpreter (see .github/workflows/ci.yml).
files = ["src/dtfit"]
ignore_missing_imports = true  # scipy/sklearn/sympy/matplotlib ship partial stubs

[tool.pyright]
# Keep the Pylance/pyright experience in step with the mypy gate. The package is
# clean at "standard"; src, examples and tests are all type-checked.
include = ["src", "examples", "tests"]
pythonVersion = "3.10"
typeCheckingMode = "standard"

[tool.coverage.run]
source = ["dtfit"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 70  # CI fails below this line-coverage percentage
